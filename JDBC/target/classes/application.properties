# ---------------------------------------------------------------------------
# JDBC bağlantı ayarları (örnek değerler — kendi ortamınıza göre düzenleyin)
# ---------------------------------------------------------------------------
# JDBC URL: protokol + alt protokol + sunucu:port + veritabanı adı + sürücü parametreleri
# serverTimezone: MySQL 8 ile saat dilimi uyarısını önlemek için genelde Z veya bölgesel ID verilir
# allowPublicKeyRetrieval: bazı kurulumlarda caching_sha2_password ile bağlantı için gerekli olabilir
jdbc.url=jdbc:mysql://localhost:3306/jdbc_learning?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# MySQL kullanıcı adı (geliştirme için sıkça root; üretimde ayrı düşük yetkili kullanıcı kullanın)
jdbc.username=root

# ÖNEMLI: Şifreyi bu dosyaya yazmayın. Ortam değişkeni JDBC_MYSQL_PASSWORD ile verin.
# Windows PowerShell: $env:JDBC_MYSQL_PASSWORD = "sifreniz"
# Linux/macOS: export JDBC_MYSQL_PASSWORD=sifreniz
